<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RailView — Ticket Status Update</title>
    <style>
      body,table,td,a{ -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%; }
      table,td{ mso-table-lspace:0pt; mso-table-rspace:0pt; }
      img{ border:0; height:auto; line-height:100%; outline:none; text-decoration:none; }
      body{ margin:0; padding:0; width:100% !important; background:#f7f3f0; font-family:Arial,Helvetica,sans-serif; }
      .container{ max-width:700px; margin:24px auto; background:#fff; border-radius:8px; overflow:hidden; }
      .header{ background:#d97706; color:#fff; padding:16px 20px; display:flex; gap:12px; align-items:center; }
      .body{ padding:20px; color:#333; }
      .status-badge{ display:inline-block; padding:8px 12px; border-radius:6px; font-weight:700; color:#fff; }
      .status-open{ background:#6b7280; }
      .status-inprogress{ background:#f59e0b; }
      .status-closed{ background:#10b981; }
      .details{ margin-top:12px; border:1px solid #efe6da; background:#fffaf1; padding:12px; border-radius:8px; }
      .cta{ display:inline-block; background:#388E3C; color:#fff; padding:10px 14px; border-radius:6px; text-decoration:none; font-weight:700; }
      .footer{ background:#fbf8f6; padding:14px 18px; font-size:12px; color:#6b6b6b; }
      @media only screen and (max-width:480px){ .body{ padding:14px; } }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div style="width:44px;height:44px;border-radius:6px;background:#fff;padding:4px;"><img src="./images/logo/logo.png" style="width:100%;height:100%;object-fit:contain;border-radius:4px;"/></div>
        <div>
          <div style="font-weight:700;">RailView Admin</div>
          <div style="font-size:12px;opacity:.95;">Ticket Status Update</div>
        </div>
      </div>
      <div class="body">
        <h2 style="margin:0 0 6px 0;">Ticket status updated</h2>
        <p style="margin:0 0 10px 0;color:#555;">Ticket <strong>{{ticket_id}}</strong> — <em>{{ticket_title}}</em></p>

        <div style="margin-bottom:10px;">
          <span class="status-badge status-{{status_class}}">{{status}}</span>
        </div>

        <div class="details">
          <div><strong>Updated by:</strong> {{updated_by}}</div>
          <div style="margin-top:6px;"><strong>Comment:</strong> {{comment}}</div>
        </div>

        <p style="margin-top:12px;">Open the ticket to view full history and add updates.</p>
        <a class="cta" href="{{ticket_link}}">Open Ticket</a>
      </div>
      <div class="footer">RailView — Ticketing notifications</div>
    </div>
  </body>
</html>
