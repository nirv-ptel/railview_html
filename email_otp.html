<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RailView — Your OTP</title>
    <style>
      body,table,td,a{ -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%; }
      table,td{ mso-table-lspace:0pt; mso-table-rspace:0pt; }
      img{ border:0; height:auto; line-height:100%; outline:none; text-decoration:none; }
      body{ margin:0; padding:0; width:100% !important; background:#f7f3f0; font-family:Arial,Helvetica,sans-serif; }
      .container{ max-width:680px; margin:24px auto; background:#fff; border-radius:8px; overflow:hidden; }
      .header{ background:#d97706; color:#fff; padding:16px 20px; display:flex; gap:12px; align-items:center; }
      .logo{ width:44px; height:44px; border-radius:6px; background:#fff; padding:4px; }
      .body{ padding:22px; color:#333; }
      .otp{ display:inline-block; font-size:28px; font-weight:800; letter-spacing:6px; background:#fff7e6; color:#b45309; padding:10px 18px; border-radius:8px; border:1px solid #f0d6b3; }
      .small{ color:#666; font-size:13px; }
      .footer{ background:#fbf8f6; padding:14px 18px; font-size:12px; color:#6b6b6b; }
      @media only screen and (max-width:480px){ .body{ padding:14px; } .otp{ font-size:22px; } }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo"><img src="./images/logo/logo.png" style="width:100%;height:100%;object-fit:contain;border-radius:4px;"/></div>
        <div>
          <div style="font-weight:700;">RailView Admin</div>
          <div style="font-size:12px;opacity:.95;">One-time passcode (OTP)</div>
        </div>
      </div>
      <div class="body">
        <h2 style="margin:0 0 6px 0;">Your verification code</h2>
        <p class="small">Use the code below to complete your action. This code will expire in 10 minutes.</p>

        <div style="margin:18px 0; text-align:center;"><span class="otp">{{OTP}}</span></div>

        <p class="small">If you did not request this code, please ignore this email or contact your administrator.</p>
      </div>
      <div class="footer">RailView — Secure access notifications</div>
    </div>
  </body>
</html>
