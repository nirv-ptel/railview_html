<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta name="supported-color-schemes" content="light dark" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <title></title>
  <style type="text/css">
    :root {
      color-scheme: light dark;
      supported-color-schemes: light dark;
    }

    @media only screen and (max-width: 768px) {
      .email-title {
        font-size: 32px !important;
      }
    }

    @media (prefers-color-scheme: dark) {
      .header-links {
        color: #ffffff !important;
      }

      .mail-text-white {
        color: #ffffff !important;
      }

      .mail-text-always-white {
        color: #ffffff !important;
      }

      .mail-text-always-black {
        color: #000000 !important;
      }

      .mail-bg-offdark {
        background-color: #181818 !important;
      }

      /* icloud only */
      .mail-message-defaults .header-links {
        color: #666666 !important;
      }

      .mail-message-defaults .mail-text-white {
        color: #000000 !important;
      }

      .mail-message-defaults .mail-text-always-white {
        color: #ffffff !important;
      }

      .mail-message-defaults .mail-text-always-black {
        color: #000000 !important;
      }

      .mail-message-defaults .mail-bg-offdark {
        background-color: #f5f5f5 !important;
      }
    }
  </style>
</head>

<body style="margin: 0">
  <table
    style="max-width: 600px; width: 100%; margin: 0 auto; border-spacing: 0px; font-family: Arial, Helvetica, 'Times New Roman', sans-serif; line-height: 1.6; padding: 20px 0;">
    <tbody>
      <tr>
        <td
          style="line-height: normal; border-radius: 6px 6px 0 0; background-image: url(./images/orange-bg.png); padding: 16px;">
          <a href="#" target="_blank">
            <img src="./images/logo/logo.png" alt="logo" style="height: 55px;" /></a>
        </td>
      </tr>
      <tr>
        <td style="background-image: url(./images/off-white-bg.png);">
          <table>
            <tr>
              <td style="padding: 10px 15px; font-size: 16px; text-align: left; color: #000000;">
                <p style="font-size: 24px; font-weight: bold; margin: 0;">Your verification code</p>

                <p class="small">Use the code below to complete your action. This code will expire in 10
                  minutes.</strong>,</p>
                <p style="margin:18px 0; text-align:center; font-weight: bold;"><span class="otp">{{OTP}}</span></p>
              </td>
            </tr>
            <tr>
              <td style="padding: 20px; border-radius: 20px; line-height: 1.6; color: #000000; font-size: 14px;">
                <div style="line-height: 1.6;">
                  <p style="margin: 0;">If you did not request this code, please ignore this email or contact your
                    administrator.</p>
                </div>
              </td>
            </tr>

          </table>
        </td>
      </tr>

      <tr>
        <td
          style="background-image: url(./images/orange-bg.png); height: 10px; border-radius: 0 0 6px 6px; font-size: 0; line-height: 0;">
          &nbsp;</td>
      </tr>
      <tr>
        <td style="padding: 0 10px; border-radius: 20px; line-height: 1.6; font-size: 12px; text-align: center;">
          <p class="mail-text-white" style="color: #636363; margin-bottom: 0;">&copy; 2026 RailView - All Rights
            Reserved.</p>
          <p
            style="margin: 10px 0 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 12px; line-height: 18px; color: #bbbbbb;">
            <a href="#" style="color: #636363; text-decoration: underline;">Privacy Policy</a> |
            <a href="#" style="color: #636363; text-decoration: underline;">Unsubscribe</a>
          </p>
        </td>
      </tr>
    </tbody>
  </table>
</body>

</html>
